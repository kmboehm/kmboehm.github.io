career-profile:
    title: About me
    summary: |
      I'm a radiation oncology resident at [Memorial Sloan Kettering](https://www.mskcc.org/research-areas/labs/members/kevin-boehm) and a postdoc in [Computational Oncology](https://componcmsk.org/), where I work with [Nikolaus Schultz](https://componcmsk.org/personnel/nikolaus-schultz/), [Francisco Sanchez-Vega](https://componcmsk.org/personnel/francisco-sanchez-vega/), and [Sohrab Shah](https://componcmsk.org/personnel/sohrab-shah/) and lead the Pathology Data Mining team.

      There's a ton of data generated during routine cancer care — pathology slides, sequencing panels, clinical records. I build AI to find useful patterns in these data. I'm especially interested in multimodal modeling, where there's a massive opportunity to connect what we see under the microscope with what's happening at the molecular level and how, taken together, that affects response to therapy.

projects:
    title: Things I'm building
    assignments:
      - title: Mosaic
        link: "https://www.biorxiv.org/content/10.1101/2025.08.14.670351v1"
        tagline: 'Inferring multi-scale molecular features from digital pathology slides. Funded by the <a href="https://www.the-ici-fund.org/recipients/details/inferring-actionable-biomarkers-from-routine-hematoxylin-and-eosin-stained-tissue" target="_blank">ICI</a> and <a href="https://www.mskcc.org/commercialization/programs-accelerators/technology-development-fund" target="_blank">aiTDIF</a>. Featured at <a href="https://www.aacr.org/blog/2025/08/18/eye-on-ai-applying-artificial-intelligence-to-drive-cancer-research-part-2/" target="_blank">AACR AI</a> and <a href="https://oncologypro.esmo.org/video-series/ai-driven-histopathology-modelling-of-tumour-subtypes-and-biomarkers" target="_blank">ESMO AI</a>. Check out the code <a href="https://github.com/kmboehm/paladin" target="_blank">here</a>.'
      - title: Orpheus
        link: "https://www.nature.com/articles/s41467-025-57283-x"
        tagline: 'Multimodal AI using clinical text and pathology slides to identify high-risk breast cancer and generate synthetic breast cancer images conditioned on risk. The code is <a href="https://github.com/kmboehm/orpheus" target="_blank">here</a>.'
      - title: Mussel
        link: "https://github.com/pathology-data-mining/Mussel"
        tagline: "Highly scalable preprocessing for digital pathology, built with Raymond Lim."

