{% assign sidebar = site.data.data.sidebar %}
{% if sidebar.interests %}
<section class="section">
  <h2 class="section-title">Interests</h2>
  <div class="pill-list">
    {% for interest in sidebar.interests %}
    <span class="pill">
      {% if interest.link %}
        <a href="{{ interest.link }}" target="_blank">{{ interest.item }}</a>
      {% else %}
        {{ interest.item }}
      {% endif %}
      {% if interest.detail %}
        <span class="pill-detail"> / {{ interest.detail }}</span>
      {% endif %}
    </span>
    {% endfor %}
  </div>
</section>
{% endif %}
