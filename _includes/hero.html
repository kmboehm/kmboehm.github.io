{% assign sidebar = site.data.data.sidebar %}
<header class="hero">
  <div class="hero-inner">

    {% if sidebar.avatar %}
    <img class="hero-avatar" src="{{ site.baseurl }}/assets/images/{{ sidebar.avatar }}" alt="profile picture" />
    {% endif %}

    <div class="hero-text">
      {% if sidebar.name %}
      <h1 class="hero-name">{{ sidebar.name }}</h1>
      {% endif %}

      {% if sidebar.tagline %}
      <p class="hero-tagline">{{ sidebar.tagline }}</p>
      {% endif %}

      {% if sidebar.short_bio %}
      <p class="hero-bio">{{ sidebar.short_bio }}</p>
      {% endif %}

      {% include contact.html %}
    </div>

  </div>
</header>
