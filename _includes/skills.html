{% assign skills = site.data.data.skills %}
{% if skills %}
<section class="section">
  <h2 class="section-title">{{ skills.title }}</h2>

  <div class="skillset">
    {% for skill in skills.toolset %}
    <div class="skill-item">
      <h3 class="level-title">{{ skill.name }}</h3>
      <div class="level-bar">
        <div class="level-bar-inner" data-level="{{ skill.level }}"></div>
      </div>
    </div>
    {% endfor %}
  </div>

</section>
{% endif %}
