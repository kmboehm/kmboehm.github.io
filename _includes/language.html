{% assign sidebar = site.data.data.sidebar %}
{% if sidebar.languages %}
<section class="section">
  <h2 class="section-title">Languages</h2>
  <div class="pill-list">
    {% for lang in sidebar.languages %}
    <span class="pill">
      {% if lang.link %}
        <a href="{{ lang.link }}" target="_blank">{{ lang.idiom }}</a>
      {% else %}
        {{ lang.idiom }}
      {% endif %}
      <span class="pill-detail">({{ lang.level }})</span>
    </span>
    {% endfor %}
  </div>
</section>
{% endif %}
