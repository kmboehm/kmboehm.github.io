{% assign focus = site.data.data.current-focus %}
{% if focus %}
<section class="section">
  <h2 class="section-title">{{ focus.title }}</h2>

  <div class="focus-grid">
    {% for item in focus.items %}
    <div class="focus-card">
      <h3 class="focus-card-title">{{ item.title }}</h3>
      <p class="focus-card-desc">{{ item.description }}</p>
    </div>
    {% endfor %}
  </div>

</section>
{% endif %}
